# ===============================
# Picom config / XFCE4
# ===============================

# Backend
backend = "glx"
vsync = true

# Shadows
shadow = true
shadow-radius = 1         # Blur size
shadow-opacity = 0.8      # Darkness of shadow
shadow-offset-x = 12      # Moves shadow to the right
shadow-offset-y = 12      # Moves shadow down
shadow-color = "#000000"

# Exclude panels/docks from shadow
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
]

# Fading (optional, can be disabled if you prefer instant windows)
fading = false

# Transparency / opacity
frame-opacity = 1.0

# Rounded corners (optional)
corner-radius = 0

# General
detect-rounded-corners = true
detect-client-opacity = true
use-damage = true

# Blur (disabled, not needed)
blur-background = false
